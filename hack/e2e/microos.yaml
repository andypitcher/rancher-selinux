# Uses Leap 15.6 as a starting point for openSUSE MicroOS e2e testing.

images:
- location: "https://download.opensuse.org/distribution/leap/15.6/appliances/openSUSE-Leap-15.6-Minimal-VM.x86_64-Cloud.qcow2"
  arch: "x86_64"
- location: "https://download.opensuse.org/distribution/leap/15.6/appliances/openSUSE-Leap-15.6-Minimal-VM.aarch64-Cloud.qcow2"
  arch: "aarch64"
# Hint: to allow 9p and virtiofs, replace the `kernel-default-base` package with `kernel-default` and reboot the VM.
# https://github.com/lima-vm/lima/issues/3055
mountType: "reverse-sshfs"
mountTypesUnsupported: ["9p", "virtiofs"]
mounts:
- location: "~"
- location: "/tmp/lima"
  writable: true
provision:
- mode: system
  script: |
    #!/bin/bash
    set -eux
    # Enable SELinux enforcing mode if not already active.
    if grep -q "selinux=1" /proc/cmdline; then
      exit 0
    fi
    zypper -n install selinux-policy-targeted policycoreutils selinux-tools
    sed -i 's/^GRUB_CMDLINE_LINUX_DEFAULT="\(.*\)"/GRUB_CMDLINE_LINUX_DEFAULT="security=selinux selinux=1 enforcing=1 \1"/' /etc/default/grub
    update-bootloader --refresh
    # Mark filesystem for relabeling on the next boot.
    touch /.autorelabel
    reboot
