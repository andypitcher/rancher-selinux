name: Tests

on:
  push:
    paths:
      - 'policy/**'
      - 'scripts/**'
      - '**/*.te'
      - '**/*.fc'
      - '**/*.if'
      - '.github/workflows/tests.yml'
  pull_request:
    paths:
      - 'policy/**'
      - 'scripts/**'
      - '**/*.te'
      - '**/*.fc'
      - '**/*.if'
      - '.github/workflows/tests.yml'
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Lint workflow YAML files
      run: |
        pip install --quiet yamllint
        yamllint .github/workflows/

  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Install Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
      with:
        go-version: 'stable'

    - run: make build DRY_RUN=true

  e2e:
    if: github.actor != 'dependabot[bot]'
    strategy:
      matrix:
        distro: [centos9, centos10, fedora42, microos]

    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    # https://lima-vm.io/docs/examples/gha/
    - name: "Install QEMU"
      run: |
        set -eux
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends ovmf qemu-system-x86 qemu-utils
        sudo modprobe kvm
        sudo chown $(whoami) /dev/kvm

    - name: "Install Lima"
      run: |
        set -eux
        LIMA_VERSION=$(curl -fsSL https://api.github.com/repos/lima-vm/lima/releases/latest | jq -r .tag_name)
        FILE="lima-${LIMA_VERSION:1}-Linux-x86_64.tar.gz"
        curl -fOSL https://github.com/lima-vm/lima/releases/download/${LIMA_VERSION}/${FILE}
        sudo tar Cxzvf /usr/local "${FILE}"
        rm -f "${FILE}"
        # Export LIMA_VERSION For the GHA cache key
        echo "LIMA_VERSION=${LIMA_VERSION}" >>$GITHUB_ENV

    - name: "Cache ~/.cache/lima"
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
      with:
        path: ~/.cache/lima
        key: lima-${{ env.LIMA_VERSION }}

    - name: E2E ${{ matrix.distro }}
      run: make e2e-${{ matrix.distro }}

  notify-failure:
    needs: e2e
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
    - name: Open issue on nightly E2E failure
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh issue create \
          --repo "${{ github.repository }}" \
          --title "Nightly E2E failure: policy tests broken ($(date -u +'%Y-%m-%d'))" \
          --body "The nightly E2E run failed on $(date -u +'%Y-%m-%d %H:%M UTC'). A recent base image update (e.g. opensuse/tumbleweed, fedora, or centos) may have broken the current SELinux policy. See the [failed workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
